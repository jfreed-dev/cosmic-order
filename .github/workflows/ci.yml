name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (fmt + clippy + tests)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libexpat1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install just
        run: |
          mkdir -p "$HOME/.local/bin"
          curl --proto '=https' --tlsv1.2 -sSfL https://just.systems/install.sh | bash -s -- --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain (rustfmt + clippy)
        run: |
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      - name: Cache cargo registry, git, and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: just pre-commit
        run: just pre-commit
