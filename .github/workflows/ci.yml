name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (fmt + clippy + tests)
    # Pinned to the arm64 spark runner. The amd64 thor runner shares the
    # default self-hosted/linux labels, but its outbound network is currently
    # unstable (see docs/development/RELEASE-RUNNER.md) and would cause false
    # CI failures. The gate is arch-agnostic, so spark is sufficient.
    runs-on: [self-hosted, linux, spark]
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libexpat1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install just
        run: |
          mkdir -p "$HOME/.local/bin"
          # The spark runner is persistent, so just may already be installed —
          # and the installer errors on an existing binary. Install only if absent.
          if [ ! -x "$HOME/.local/bin/just" ]; then
            curl --proto '=https' --tlsv1.2 -sSfL https://just.systems/install.sh | bash -s -- --to "$HOME/.local/bin"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain (rustfmt + clippy)
        run: |
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      - name: Cache cargo registry, git, and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: just pre-commit
        run: just pre-commit
