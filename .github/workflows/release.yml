name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag -a v0.16.0 -m "v0.16.0" && git push origin v0.16.0
# This builds the amd64 .deb and publishes a GitHub Release with the
# package attached and notes pulled from CHANGELOG.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release and upload assets

jobs:
  release:
    name: Build .deb and publish release
    # An amd64 (X64) runner is required — the .deb is architecture-specific
    # and the homelab's default self-hosted runner is arm64. Register an
    # x86_64 self-hosted runner (e.g. hosted on Thor) so this job has a
    # matching target.
    runs-on: [self-hosted, linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            devscripts \
            dpkg-dev \
            fakeroot \
            libexpat1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install just
        run: |
          mkdir -p "$HOME/.local/bin"
          curl --proto '=https' --tlsv1.2 -sSfL https://just.systems/install.sh \
            | bash -s -- --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup default stable
          rustc --version

      - name: Ensure GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo mkdir -p -m 755 /etc/apt/keyrings
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Build .deb
        run: |
          git config --global --add safe.directory '*'
          dpkg-buildpackage -us -uc -b -d
          mkdir -p dist
          mv ../cosmic-order_*_amd64.deb dist/
          ls -l dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ ("^## \\[" v "\\]") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            dist/cosmic-order_*_amd64.deb
