<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- COSMIC ORDER Icon - Placeholder -->
  <!-- Represents "order" with organized grid pattern -->

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1e1e2e"/>

  <!-- Grid pattern representing "order" -->
  <g fill="#89b4fa">
    <!-- Top row -->
    <rect x="24" y="24" width="22" height="22" rx="4"/>
    <rect x="53" y="24" width="22" height="22" rx="4"/>
    <rect x="82" y="24" width="22" height="22" rx="4"/>

    <!-- Middle row -->
    <rect x="24" y="53" width="22" height="22" rx="4"/>
    <rect x="53" y="53" width="22" height="22" rx="4" fill="#cba6f7"/>
    <rect x="82" y="53" width="22" height="22" rx="4"/>

    <!-- Bottom row -->
    <rect x="24" y="82" width="22" height="22" rx="4"/>
    <rect x="53" y="82" width="22" height="22" rx="4"/>
    <rect x="82" y="82" width="22" height="22" rx="4"/>
  </g>

  <!-- Accent border -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#89b4fa" stroke-width="2"/>
</svg>
