# Rust formatting configuration
# Following COSMIC ecosystem conventions (defaults)

edition = "2024"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"

# Import ordering (stable options)
reorder_imports = true
reorder_modules = true

# Note: The following options require nightly rustfmt:
# imports_granularity = "Module"
# group_imports = "StdExternalCrate"
# normalize_comments = false
# wrap_comments = false
